name: Scrape Films and Deploy to GitHub Pages

on:
  schedule:
    # Run daily at 6:00 AM UTC (adjust timezone as needed)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: make install
    
    - name: Run full scraping pipeline
      env:
        TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: make pipeline
    
    - name: Commit updated data and index.html
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/*.json index.html || true
        git diff --staged --quiet || git commit -m "Auto-update: Latest film data and website [$(date)]"
        git push || true
    
    - name: Upload artifacts for debugging
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: scraping-results
        path: |
          data/*_films_with_english_subs.json
          index.html
        retention-days: 7
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Create Pages artifact
      run: |
        mkdir -p _site
        cp index.html _site/
        # Copy any additional assets if needed
        if [ -f "favicon.ico" ]; then
          cp favicon.ico _site/
        fi
    
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
    
    - name: Notify completion
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "🎉 Deployment successful!"
          echo "📱 Site available at: ${{ steps.deployment.outputs.page_url }}"
        else
          echo "❌ Deployment failed"
        fi

    - name: Notify Discord on failure
      if: failure()
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        if [ -z "$DISCORD_WEBHOOK" ]; then
          echo "DISCORD_WEBHOOK secret not set; skipping Discord notification"
          exit 0
        fi
        payload=$(jq -n \
          --arg content "❌ **with-english-subs** scrape & deploy failed on \`${GITHUB_REF_NAME}\` ([run]($RUN_URL))" \
          '{content: $content, allowed_mentions: {parse: []}}')
        curl -fsS -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK"